services:
  api:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./backend:/app
      - ./reports:/reports
    command: sh -c "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      - REPORTS_DIR=/reports

  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000/api
      - VITE_API_ORIGIN=http://localhost:8000
    depends_on:
      - api
